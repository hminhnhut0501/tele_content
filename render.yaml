services:
  - type: web
    name: tele-content-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_MODE
        value: sqlite
      - key: TELEVAULT_DB_PATH
        value: /tmp/content_hub.db

  - type: web
    name: tele-content-ui
    runtime: node
    plan: free
    rootDir: admin-ui
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 20.17.0
      - key: NEXT_PUBLIC_API_BASE_URL
        sync: false
