<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tele Content Hub</title>
    <link rel="icon" href="data:,">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ request.url_for('static', path='dist/app.css') }}">
    <script defer src="{{ request.url_for('static', path='js/app-shell.js') }}"></script>
    <script defer src="{{ request.url_for('static', path='js/content-hub/state.js') }}"></script>
    <script defer src="{{ request.url_for('static', path='js/content-hub/helpers.js') }}"></script>
    <script defer src="{{ request.url_for('static', path='js/content-hub/lifecycle.js') }}"></script>
    <script defer src="{{ request.url_for('static', path='js/content-hub/groups.js') }}"></script>
    <script defer src="{{ request.url_for('static', path='js/content-hub/topics.js') }}"></script>
    <script defer src="{{ request.url_for('static', path='js/content-hub/campaigns.js') }}"></script>
    <script defer src="{{ request.url_for('static', path='js/content-hub.js') }}"></script>
    <script defer src="{{ request.url_for('static', path='vendor/alpine.min.js') }}"></script>
</head>
<body x-data="appShell()" x-init="init()">
    <div class="app-shell">
        <header class="app-bar">
            <div class="app-bar__title">
                <div class="app-bar__eyebrow">Admin CP</div>
                <div class="app-bar__headline">Tele Content Hub</div>
            </div>
            <div class="app-bar__meta">
                <span class="admin-chip">FastAPI</span>
                <span class="admin-chip" :class="appStatus.database_url_set ? 'admin-chip--ok' : ''" x-text="appStatus.database_url_set ? 'Supabase Ready' : 'SQLite Mode'"></span>
                <span class="admin-chip" :class="appStatus.string_session ? 'admin-chip--ok' : 'admin-chip--warn'" x-text="appStatus.string_session ? 'TG Session Ready' : 'TG Session Missing'"></span>
                <button @click="refreshStatus()" class="admin-chip admin-chip--action">Tải lại</button>
            </div>
        </header>

        <div class="app-shell__body">
            <aside class="sidebar">
                <div>
                    <div class="sidebar__brand">
                        <div class="sidebar__badge"></div>
                        <div>
                            <div class="sidebar__name">Tele Content</div>
                            <div class="sidebar__sub">prive_bot inspired UI</div>
                        </div>
                    </div>

                    <div class="sidebar-group-label">Vận hành</div>

                    <nav class="sidebar-nav">
                        <button @click="go('dashboard')" :class="activeView === 'dashboard' ? 'sidebar-tab active' : 'sidebar-tab'">
                            <span>Dashboard</span>
                            <span class="sidebar-tab__count">01</span>
                        </button>
                        <button @click="go('workspace')" :class="activeView === 'workspace' ? 'sidebar-tab active' : 'sidebar-tab'">
                            <span>Workspace</span>
                            <span class="sidebar-tab__count">02</span>
                        </button>
                        <button @click="go('settings')" :class="activeView === 'settings' ? 'sidebar-tab active' : 'sidebar-tab'">
                            <span>Settings</span>
                            <span class="sidebar-tab__count">03</span>
                        </button>
                    </nav>
                </div>

                <div class="sidebar__footer">
                    <div class="panel-soft">
                        <div class="panel-soft__head">Quick Actions</div>
                        <button @click="go('workspace')" class="ghost-button w-full">Mở Workspace</button>
                        <button @click="go('settings')" class="ghost-button w-full">Đi tới Settings</button>
                        <a href="/healthz" target="_blank" class="ghost-button w-full block text-center">Mở /healthz</a>
                    </div>
                </div>
            </aside>

            <main class="content-shell">
                <section class="content-shell__hero">
                    <div>
                        <div class="panel-kicker">Tele Content Hub</div>
                        <div class="panel-title" x-text="viewMeta[activeView]?.title || 'Content Hub Workspace'"></div>
                        <div class="panel-copy" x-text="viewMeta[activeView]?.description || ''"></div>
                    </div>
                    <div class="hero-actions">
                        <button @click="refreshStatus()" class="btn-primary">Refresh</button>
                    </div>
                </section>

                <section class="content-shell__body">
                    {% include 'dashboard.html' %}
                    {% include 'tab_content_hub.html' %}
                    {% include 'settings.html' %}
                </section>
            </main>
        </div>
    </div>
</body>
</html>
