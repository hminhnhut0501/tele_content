<section class="col-span-12 xl:col-span-8 workspace-surface overflow-hidden flex flex-col min-h-0">
    <div class="workspace-surface__head">
        <div>
            <div class="workspace-title">Right campaign workspace</div>
            <div class="workspace-subtitle">Topic đang chọn: <span class="font-semibold text-slate-800" x-text="selectedTopic?.name || 'Chưa chọn topic'"></span></div>
        </div>
        <div class="flex items-center gap-2">
            <button x-show="selectedTopic" @click="runTopic(selectedTopic.id)" class="h-8 px-3 rounded-lg bg-emerald-600 text-[10px] text-white">Chạy topic</button>
            <button x-show="selectedTopic" @click="stopAllInTopic()" class="h-8 px-3 rounded-lg bg-amber-500 text-[10px] text-white">Dừng topic</button>
            <button x-show="selectedTopic" @click="resetErrorsInTopic()" class="h-8 px-3 rounded-lg border border-slate-200 bg-white text-[10px] text-slate-700">Reset lỗi</button>
            <button x-show="selectedTopic" @click="openCreateForm()" class="h-8 px-3 rounded-lg bg-sky-600 text-white text-[11px] font-semibold">+ Thêm nội dung</button>
        </div>
    </div>

    {% include 'workspace/campaign_table.html' %}
    {% include 'workspace/campaign_form.html' %}
    {% include 'workspace/campaign_logs.html' %}
</section>
