<aside class="col-span-12 xl:col-span-4 rounded-2xl border border-slate-800/90 bg-slate-900/30 overflow-hidden flex flex-col min-h-0">
    <div class="p-3 border-b border-slate-800/90 bg-slate-950/30">
        <div class="flex items-center justify-between gap-3">
            <div>
                <div class="text-[11px] font-semibold text-slate-400 uppercase tracking-[0.18em]">Left Topic Rail</div>
                <div class="text-[10px] text-slate-500 mt-1">Chọn topic để mở workspace.</div>
            </div>
            <button @click="showOps = !showOps" class="h-7 px-2.5 rounded border border-slate-700/90 text-[10px] text-slate-300" x-text="showOps ? 'Ẩn stats' : 'Hiện stats'"></button>
        </div>
        <div class="mt-2">
            <input x-model="topicSearch" class="input-new h-8 text-xs py-1.5" placeholder="Tìm topic theo tên / id...">
        </div>
        <div class="mt-2 grid grid-cols-4 gap-1">
            <button @click="topicFilter='all'" :class="topicFilter==='all' ? 'bg-sky-600 text-white' : 'bg-slate-900/90 text-slate-300'" class="h-7 rounded-lg text-[10px]">Tất cả</button>
            <button @click="topicFilter='pending'" :class="topicFilter==='pending' ? 'bg-amber-600 text-white' : 'bg-slate-900/90 text-slate-300'" class="h-7 rounded-lg text-[10px]">Cần chạy</button>
            <button @click="topicFilter='running'" :class="topicFilter==='running' ? 'bg-cyan-600 text-white' : 'bg-slate-900/90 text-slate-300'" class="h-7 rounded-lg text-[10px]">Đang chạy</button>
            <button @click="topicFilter='done'" :class="topicFilter==='done' ? 'bg-emerald-600 text-white' : 'bg-slate-900/90 text-slate-300'" class="h-7 rounded-lg text-[10px]">Hoàn tất</button>
        </div>
        <div class="mt-2 flex gap-2">
            <input x-ref="topicLinkInput" x-model="topicForm.topic_link" class="input-new h-8 text-xs py-1.5" placeholder="dán link msg topic...">
            <button @click="createTopic" class="h-8 px-3 rounded-lg bg-emerald-600 text-white text-[11px] font-semibold">Tạo</button>
        </div>
        <div class="mt-1 text-[10px] text-slate-500">Ví dụ: `t.me/c/123456/1989/2288`</div>
    </div>
    <div class="flex-1 overflow-y-auto custom-scroll p-2.5 space-y-2.5">
        <template x-for="t in filteredTopics()" :key="t.id">
            <div @click="selectTopic(t)" :class="selectedTopic?.id===t.id ? 'border-sky-500/45 bg-sky-500/10 shadow-[0_0_0_1px_rgba(56,189,248,0.08)]' : 'border-slate-800/90 bg-slate-950/42'" class="border rounded-2xl p-3 cursor-pointer transition-colors hover:border-slate-700/90 hover:bg-slate-950/58">
                <div class="flex items-start justify-between gap-3">
                    <div class="min-w-0">
                        <div class="text-sm font-semibold text-white truncate" x-text="t.name"></div>
                        <div class="text-[10px] text-slate-500 mt-0.5" x-text="'#' + (t.source_topic_id || 0) + ' -> #' + (t.target_topic_id || 0)"></div>
                    </div>
                    <span class="px-2 py-0.5 rounded-full border border-slate-700/90 bg-slate-900/90 text-slate-400 text-[10px] font-semibold" x-text="(t.item_count || 0) + ' items'"></span>
                </div>
                <div class="mt-2 text-[10px] text-slate-400 flex flex-wrap gap-2">
                    <span>Còn lại: <span class="text-amber-300 font-semibold" x-text="t.remaining_items || 0"></span></span>
                    <span>Đã chạy: <span class="text-emerald-300 font-semibold" x-text="t.done_items || 0"></span></span>
                    <span>Queue: <span class="text-cyan-300 font-semibold" x-text="t.queued_count || 0"></span></span>
                    <span x-show="t.is_running_topic" class="px-2 py-0.5 rounded-full border border-cyan-500/30 bg-cyan-500/10 text-cyan-300 font-semibold">Running</span>
                </div>
                <div class="mt-2 flex items-center justify-between gap-2">
                    <span class="text-[10px] text-slate-500" x-text="'Tổng ' + (t.total_items || t.item_count || 0)"></span>
                    <div class="flex items-center gap-2">
                        <button @click.stop="renameTopic(t)" class="text-[10px] text-cyan-300">Sửa tên</button>
                        <button @click.stop="deleteTopic(t.id)" class="text-[10px] text-rose-300">Xoá</button>
                    </div>
                </div>
            </div>
        </template>
        <div x-show="!filteredTopics().length" class="rounded-2xl border border-dashed border-slate-700/80 bg-slate-950/35 px-4 py-4 text-[11px] text-slate-400">
            <div class="font-semibold text-slate-200">Không có topic phù hợp bộ lọc</div>
            <div class="mt-1 leading-5">Thử đổi bộ lọc, xoá từ khoá tìm kiếm, hoặc dán link message topic ở ô phía trên để tạo workspace con mới.</div>
        </div>
    </div>
</aside>
