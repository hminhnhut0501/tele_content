<section class="grid grid-cols-12 gap-3">
    <div class="col-span-12 lg:col-span-7 grid grid-cols-12 gap-3">
        <div class="col-span-12 sm:col-span-4 rounded-2xl border border-slate-800/90 bg-gradient-to-br from-slate-900/42 to-slate-950/40 p-4">
            <div class="text-[10px] font-bold uppercase tracking-[0.18em] text-slate-500">Topics total</div>
            <div class="mt-2 text-3xl font-black text-white" x-text="groupProgress.total_topics || 0"></div>
        </div>
        <div class="col-span-12 sm:col-span-4 rounded-2xl border border-slate-800/90 bg-gradient-to-br from-slate-900/42 to-slate-950/40 p-4">
            <div class="text-[10px] font-bold uppercase tracking-[0.18em] text-slate-500">Running campaigns</div>
            <div class="mt-2 text-3xl font-black text-cyan-300" x-text="groupProgress.running_items || 0"></div>
        </div>
        <div class="col-span-12 sm:col-span-4 rounded-2xl border border-slate-800/90 bg-gradient-to-br from-slate-900/42 to-slate-950/40 p-4">
            <div class="text-[10px] font-bold uppercase tracking-[0.18em] text-slate-500">Queue</div>
            <div class="mt-2 text-3xl font-black text-amber-300" x-text="groupProgress.queued_items || 0"></div>
        </div>
        <div class="col-span-12 sm:col-span-4 rounded-2xl border border-slate-800/90 bg-gradient-to-br from-slate-900/42 to-slate-950/40 p-4">
            <div class="text-[10px] font-bold uppercase tracking-[0.18em] text-slate-500">Done</div>
            <div class="mt-2 text-3xl font-black text-emerald-300" x-text="groupProgress.done_items || 0"></div>
        </div>
        <div class="col-span-12 sm:col-span-4 rounded-2xl border border-slate-800/90 bg-gradient-to-br from-slate-900/42 to-slate-950/40 p-4">
            <div class="text-[10px] font-bold uppercase tracking-[0.18em] text-slate-500">Next auto run</div>
            <div class="mt-2 text-sm font-semibold text-cyan-300" x-text="Number(activeGroup?.auto_next_run_at || 0) ? new Date(Number(activeGroup.auto_next_run_at) * 1000).toLocaleString('vi-VN', { timeZone: 'Asia/Ho_Chi_Minh', hour12: false }) : '-'"></div>
        </div>
        <div class="col-span-12 sm:col-span-4 rounded-2xl border border-slate-800/90 bg-gradient-to-br from-slate-900/42 to-slate-950/40 p-4">
            <div class="text-[10px] font-bold uppercase tracking-[0.18em] text-slate-500">Last result</div>
            <div class="mt-2 text-sm font-semibold text-emerald-300" x-text="activeGroup?.auto_last_result || '-'"></div>
        </div>
    </div>

    <div class="col-span-12 lg:col-span-5 rounded-2xl border border-teal-800/45 bg-gradient-to-br from-teal-500/7 to-slate-950/30 p-4">
        <div class="flex items-start justify-between gap-3">
            <div>
                <div class="text-[11px] font-semibold text-slate-200 uppercase tracking-[0.18em]">Auto-run Group</div>
                <div class="text-[10px] text-slate-500 mt-1">Bật một lần, scheduler sẽ chạy theo khung giờ riêng của group cho tới khi bạn tắt.</div>
            </div>
            <button @click="showGroupLogs = !showGroupLogs" class="h-8 px-3.5 rounded-lg border border-slate-700/90 text-[10px] text-slate-300" x-text="showGroupLogs ? 'Ẩn log' : 'Xem log'"></button>
        </div>
        <div class="mt-3 grid grid-cols-12 gap-2">
            <div class="col-span-12 lg:col-span-6 space-y-1.5">
                <label class="text-[10px] font-bold text-slate-500 uppercase px-1">Khung giờ</label>
                <input x-model="groupAutoForm.auto_slots" class="input-new h-9 text-xs" placeholder="09:00, 12:00, 15:00, 21:00">
            </div>
            <div class="col-span-6 lg:col-span-3 space-y-1.5">
                <label class="text-[10px] font-bold text-slate-500 uppercase px-1">Số topic/lượt</label>
                <input type="number" min="1" max="50" x-model.number="groupAutoForm.auto_pick_count" class="input-new h-9 text-center text-xs">
            </div>
            <div class="col-span-6 lg:col-span-3 space-y-1.5">
                <label class="text-[10px] font-bold text-slate-500 uppercase px-1">Chiến lược</label>
                <select x-model="groupAutoForm.auto_strategy" class="input-new h-9 text-xs">
                    <option value="round_robin">Round-robin</option>
                    <option value="random">Random</option>
                </select>
            </div>
        </div>
        <div class="mt-3 text-[10px] text-slate-500 flex flex-wrap gap-3">
            <span>Đang: <span class="text-slate-200 font-mono" x-text="groupAutoSummary()"></span></span>
            <span>KQ: <span class="text-emerald-300 font-mono" x-text="activeGroup?.auto_last_result || '-'"></span></span>
        </div>
    </div>
</section>
