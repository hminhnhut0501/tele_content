<div x-show="logItemId && showCampaignLogs" class="border-t border-slate-800/90 bg-slate-950/35 p-3 max-h-40 overflow-y-auto custom-scroll">
    <div class="text-[11px] font-semibold text-slate-400 mb-2">Log campaign #<span x-text="logItemId"></span></div>
    <template x-for="e in itemLogs" :key="e.id">
        <div class="text-[11px] border border-slate-800 rounded px-2 py-1 mb-1 bg-slate-950/40">
            <span class="text-slate-500" x-text="new Date((e.created_at||0)*1000).toLocaleTimeString('vi-VN', { timeZone: 'Asia/Ho_Chi_Minh', hour12: false })"></span>
            <span class="mx-1">·</span>
            <span :class="e.level==='error' ? 'text-rose-300' : e.level==='ok' ? 'text-emerald-300' : 'text-cyan-300'" x-text="e.code"></span>
            <span class="mx-1">·</span>
            <span class="text-slate-300" x-text="e.message"></span>
        </div>
    </template>
    <div x-show="!itemLogs.length" class="rounded-xl border border-dashed border-slate-700/80 bg-slate-950/35 px-3 py-2 text-[11px] text-slate-500">
        Chưa có log campaign. Sau khi chạy thử, trạng thái scan, queue, send và lỗi runtime sẽ hiện ở đây.
    </div>
</div>
