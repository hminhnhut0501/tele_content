<div x-show="formOpen" class="flex-1 min-h-0 border-t border-slate-800/90 bg-slate-950/30 flex flex-col overflow-hidden">
    <div class="p-3 border-b border-slate-800/90 flex items-center justify-between">
        <div class="text-[11px] font-semibold text-slate-400">Thêm/Sửa campaign con</div>
        <button @click="formOpen=false" class="h-7 px-2.5 rounded border border-slate-700 text-[10px] text-slate-300">Đóng</button>
    </div>
    <div class="flex-1 min-h-0 overflow-y-auto custom-scroll p-3 space-y-3">
        <div class="grid grid-cols-2 gap-3">
            <div>
                <label class="text-[10px] font-bold text-slate-500 uppercase">Link nguồn / Topic</label>
                <input x-ref="campaignSourceInput" x-model="itemForm.source_start_link" class="input-new" placeholder="t.me/c/group/topic/msg">
                <div class="mt-1 text-[10px] text-slate-500">Hỗ trợ cả `t.me/c/...`, `t.me/username/msg`, và `t.me/username/topic/msg`.</div>
            </div>
            <div>
                <label class="text-[10px] font-bold text-slate-500 uppercase">Link kết thúc (tuỳ chọn)</label>
                <input x-model="itemForm.source_end_link" @input="onSourceEndInput($event.target.value)" class="input-new" placeholder="t.me/c/...">
            </div>
        </div>
        <div class="flex items-center justify-between gap-3 rounded-2xl border border-slate-800/90 bg-slate-950/40 px-3 py-2.5">
            <div>
                <div class="text-[10px] font-bold text-slate-500 uppercase">Chỉ quét từ source_start_link tới hiện tại</div>
                <div class="text-[10px] text-slate-500">Bật để bỏ trống Link kết thúc, rồi lần sau chạy tiếp theo cursor last_msg_id.</div>
            </div>
            <button @click="toggleFollowLatest()" class="h-8 px-3 rounded-lg text-[11px] font-semibold border"
                    :class="itemForm.follow_latest ? 'border-cyan-500/30 bg-cyan-500/10 text-cyan-300' : 'border-slate-700 bg-slate-900 text-slate-300'"
                    x-text="itemForm.follow_latest ? 'Bật' : 'Tắt'"></button>
        </div>
        <div>
            <div class="flex items-center justify-between mb-1">
                <label class="text-[10px] font-bold text-slate-500 uppercase">Kênh đích (hỗ trợ topic)</label>
                <button @click="targetReadonly = !targetReadonly"
                        :class="targetReadonly ? 'text-amber-300 border-amber-800/40 bg-amber-500/10' : 'text-cyan-300 border-cyan-800/40 bg-cyan-500/10'"
                        class="h-6 px-2 rounded-md border text-[10px] font-semibold">
                    <span x-text="targetReadonly ? 'Sửa tay' : 'Khoá lại'"></span>
                </button>
            </div>
            <input x-model="itemForm.target_link"
                   :readonly="targetReadonly"
                   :class="targetReadonly ? 'opacity-80 cursor-not-allowed border-slate-700/80 bg-slate-950/70' : ''"
                   class="input-new"
                   placeholder="Dán link topic hoặc @username">
            <div class="mt-1 text-[10px] text-slate-500" x-show="targetReadonly">Đang khoá tự động theo topic đã chọn để tránh nhầm đích.</div>
        </div>
        <div>
            <label class="text-[10px] font-bold text-slate-500 uppercase">Tiêu đề nội dung</label>
            <input x-model="itemForm.title" class="input-new" placeholder="VD: Bài sáng">
        </div>
        <div>
            <label class="text-[10px] font-bold text-slate-500 uppercase">Caption mặc định</label>
            <textarea x-model="itemForm.caption" rows="3" class="input-new resize-none" placeholder="Để trống nếu muốn giữ nguyên hoặc auto"></textarea>
        </div>
        <div class="grid grid-cols-2 gap-3">
            <div>
                <label class="text-[10px] font-bold text-slate-500 uppercase">Kiểu gộp media</label>
                <select x-model="itemForm.group_mode" class="input-new">
                    <option value="keep">Native (Giữ Album)</option>
                    <option value="split">Split</option>
                    <option value="smart">Smart</option>
                    <option value="pair">Pair</option>
                </select>
            </div>
            <div>
                <label class="text-[10px] font-bold text-slate-500 uppercase">Thứ tự quét</label>
                <select x-model="itemForm.order_mode" class="input-new">
                    <option value="auto">Tự động</option>
                    <option value="oldest">Cũ tới mới</option>
                    <option value="newest">Mới tới cũ</option>
                </select>
            </div>
        </div>
        <div class="grid grid-cols-3 gap-3">
            <div><label class="text-[10px] font-bold text-slate-500 uppercase">Số lượng</label><input type="number" x-model.number="itemForm.batch_size" class="input-new text-center"></div>
            <div><label class="text-[10px] font-bold text-slate-500 uppercase">Delay Min</label><input type="number" x-model.number="itemForm.delay_min" class="input-new text-center"></div>
            <div><label class="text-[10px] font-bold text-slate-500 uppercase">Delay Max</label><input type="number" x-model.number="itemForm.delay_max" class="input-new text-center"></div>
        </div>
        <div class="pt-1">
            <button @click="saveItem" class="btn-primary w-full h-11 rounded-xl">Lưu nội dung</button>
        </div>
    </div>
</div>
