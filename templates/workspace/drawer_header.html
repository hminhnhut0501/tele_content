<div class="px-6 py-4.5 border-b border-slate-800/90 bg-slate-950/86 flex items-start justify-between gap-4">
    <div class="min-w-0">
        <div class="flex items-center gap-3 flex-wrap">
            <h3 class="text-[26px] font-black text-white leading-tight truncate" x-text="activeGroup?.name || 'Group'"></h3>
            <span class="px-2.5 py-1 rounded-full border border-slate-700/90 bg-slate-900/90 text-slate-300 text-[10px] font-semibold font-mono">
                ID: <span x-text="activeGroup?.source_key || ''"></span>
            </span>
            <span class="px-2.5 py-1 rounded-full border border-cyan-700/40 bg-cyan-500/10 text-cyan-300 text-[10px] font-semibold" x-text="'Queue ' + (queue.queue_size || 0)"></span>
            <span class="px-2.5 py-1 rounded-full border border-emerald-700/40 bg-emerald-500/10 text-emerald-300 text-[10px] font-semibold" x-text="'Worker ' + (queue.active_workers || 0) + '/' + (queue.max_concurrency || 1)"></span>
        </div>
        <div class="mt-2 text-[11px] text-slate-500 flex flex-wrap gap-4">
            <span x-text="'Topics ' + (groupProgress.total_topics || 0)"></span>
            <span x-text="'Items ' + (groupProgress.total_items || 0)"></span>
            <span x-text="'Running ' + (groupProgress.running_items || 0)"></span>
            <span x-text="'Queue ' + (groupProgress.queued_items || 0)"></span>
            <span x-text="'Done ' + (groupProgress.done_items || 0)"></span>
        </div>
    </div>
    <div class="flex items-center gap-2 shrink-0">
        <button @click="toggleGroupAuto()" class="h-10 px-3.5 rounded-xl text-[11px] font-semibold border"
                :class="groupAutoForm.auto_enabled ? 'border-emerald-700/50 bg-emerald-500/10 text-emerald-300' : 'border-slate-700 bg-slate-900 text-slate-300'"
                x-text="groupAutoForm.auto_enabled ? 'Tắt auto' : 'Bật auto'"></button>
        <button @click="saveGroupAuto()" class="h-10 px-4 rounded-xl bg-teal-600 text-white text-[11px] font-semibold shadow-sm shadow-teal-950/20">Lưu auto</button>
        <button @click="closeDrawer()" class="h-10 w-10 rounded-xl bg-slate-900 border border-slate-800 text-slate-400 hover:text-white">✕</button>
    </div>
</div>
