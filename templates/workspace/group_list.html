<main class="flex-1 flex flex-col min-w-0 bg-slate-900/55 border border-slate-800/90 rounded-2xl overflow-hidden shadow-[0_20px_80px_rgba(2,8,23,0.32)]">
    <div class="p-5 border-b border-slate-800/90 bg-slate-950/25 flex items-center justify-between">
        <div class="flex items-center gap-3 flex-wrap">
            <h2 class="text-[11px] font-black text-white uppercase tracking-[0.22em]">Danh sách Group</h2>
            <div class="text-[11px] text-slate-500">Queue: <span class="text-cyan-300 font-semibold" x-text="queue.queue_size"></span> · Worker: <span class="text-cyan-300 font-semibold" x-text="queue.active_workers + '/' + queue.max_concurrency"></span></div>
        </div>
    </div>
    <div class="flex-1 overflow-y-auto p-5 custom-scroll space-y-3">
        <template x-for="g in groups" :key="g.id">
            <div class="border rounded-2xl p-4 flex items-center justify-between gap-3 transition-colors"
                 :class="g.auto_attention
                    ? 'border-amber-500/50 bg-amber-500/[0.07] shadow-[0_0_28px_rgba(245,158,11,0.08)]'
                    : 'border-slate-800/90 bg-slate-950/42 hover:border-slate-700/90 hover:bg-slate-950/60'">
                <div class="min-w-0">
                    <div class="text-[15px] font-black text-white truncate" x-text="g.name + ' (' + g.source_key + ')' "></div>
                    <div class="text-[11px] text-slate-500 mt-1" x-text="(g.topic_count || 0) + ' topics • ' + (g.item_count || 0) + ' items • ' + (g.auto_slots_count || 0) + ' slots'"></div>
                    <div class="mt-2 flex flex-wrap items-center gap-2 text-[10px]">
                        <span :class="Number(g.auto_enabled || 0) ? 'border-emerald-500/30 bg-emerald-500/10 text-emerald-300' : 'border-slate-700/90 bg-slate-900/90 text-slate-400'" class="px-2.5 py-1 rounded-full border font-semibold tracking-wide">
                            <span x-text="Number(g.auto_enabled || 0) ? 'AUTO ON' : 'AUTO OFF'"></span>
                        </span>
                        <span class="px-2.5 py-1 rounded-full border border-slate-700/90 bg-slate-900/90 text-slate-400 font-mono" x-text="'Next ' + (g.auto_next_run_in_sec || 0) + 's'"></span>
                        <span x-show="g.auto_attention === 'content_exhausted'"
                              title="Tất cả campaign con đang bật đã quét tới hiện tại và không còn nội dung mới. Hãy thêm campaign con hoặc chờ nguồn có bài mới."
                              class="px-2.5 py-1 rounded-full border border-amber-500/50 bg-amber-500/15 text-amber-200 font-black tracking-wide">
                            HẾT NỘI DUNG · CẦN THÊM CAMPAIGN
                        </span>
                        <span x-show="g.auto_attention === 'no_campaign'"
                              title="Auto-run đang bật nhưng group chưa có campaign con nào được bật."
                              class="px-2.5 py-1 rounded-full border border-rose-500/50 bg-rose-500/15 text-rose-200 font-black tracking-wide">
                            CHƯA CÓ CAMPAIGN BẬT
                        </span>
                    </div>
                </div>
                <div class="flex items-center gap-2 shrink-0">
                    <button @click="openGroup(g)" class="h-8 px-3.5 rounded-xl bg-sky-600 text-white text-[11px] font-semibold shadow-sm shadow-sky-950/30">Mở</button>
                    <button @click="deleteGroup(g.id)" class="h-8 px-3.5 rounded-xl border border-rose-800/60 bg-rose-500/10 text-rose-300 text-[11px] font-semibold">Xoá</button>
                </div>
            </div>
        </template>
        <div x-show="!groups.length" class="rounded-2xl border border-dashed border-slate-700/80 bg-slate-950/35 p-5">
            <div class="flex flex-col gap-3">
                <div>
                    <div class="text-sm font-semibold text-white">Chưa có group nào</div>
                    <div class="mt-1 text-xs leading-6 text-slate-400">Bắt đầu bằng cách tạo 1 group nguồn để gom topic, campaign con và lịch auto-run vào cùng một workspace.</div>
                </div>
                <div class="flex flex-wrap gap-2 text-[11px] text-slate-400">
                    <span class="rounded-full border border-slate-700/90 bg-slate-900/90 px-3 py-1">1. Nhập tên group</span>
                    <span class="rounded-full border border-slate-700/90 bg-slate-900/90 px-3 py-1">2. Dán `source_key` hoặc group ID</span>
                    <span class="rounded-full border border-slate-700/90 bg-slate-900/90 px-3 py-1">3. Bấm `Lưu Group`</span>
                </div>
            </div>
        </div>
    </div>
</main>
