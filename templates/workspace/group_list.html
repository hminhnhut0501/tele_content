<main class="flex-1 flex flex-col min-w-0 workspace-surface">
    <div class="workspace-surface__head">
        <div class="flex items-center gap-3 flex-wrap">
            <div>
                <div class="workspace-title">Danh sách group</div>
                <div class="workspace-subtitle">Queue: <span class="font-semibold text-slate-700" x-text="queue.queue_size"></span> · Worker: <span class="font-semibold text-slate-700" x-text="queue.active_workers + '/' + queue.max_concurrency"></span></div>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <span class="admin-chip">Groups <span class="ml-2 rounded-full bg-slate-100 px-2 py-0.5 text-[10px]" x-text="groups.length"></span></span>
        </div>
    </div>
    <div class="workspace-surface__body flex-1 overflow-y-auto custom-scroll space-y-3">
        <template x-for="g in groups" :key="g.id">
            <div class="border rounded-[16px] p-4 flex items-center justify-between gap-3 transition-colors bg-white"
                 :class="g.auto_attention
                    ? 'border-amber-500/30 bg-amber-50 shadow-[0_0_28px_rgba(245,158,11,0.05)]'
                    : 'border-slate-200 hover:border-slate-300 hover:bg-slate-50'">
                <div class="min-w-0">
                    <div class="text-[15px] font-black text-slate-900 truncate" x-text="g.name + ' (' + g.source_key + ')' "></div>
                    <div class="text-[11px] text-slate-500 mt-1" x-text="(g.topic_count || 0) + ' topics • ' + (g.item_count || 0) + ' items • ' + (g.auto_slots_count || 0) + ' slots'"></div>
                    <div class="mt-2 flex flex-wrap items-center gap-2 text-[10px]">
                        <span :class="Number(g.auto_enabled || 0) ? 'border-emerald-500/25 bg-emerald-50 text-emerald-700' : 'border-slate-200 bg-slate-50 text-slate-500'" class="px-2.5 py-1 rounded-full border font-semibold tracking-wide">
                            <span x-text="Number(g.auto_enabled || 0) ? 'AUTO ON' : 'AUTO OFF'"></span>
                        </span>
                        <span class="px-2.5 py-1 rounded-full border border-slate-200 bg-slate-50 text-slate-500 font-mono" x-text="'Next ' + (g.auto_next_run_in_sec || 0) + 's'"></span>
                        <span x-show="g.auto_attention === 'content_exhausted'"
                              title="Tất cả campaign con đang bật đã quét tới hiện tại và không còn nội dung mới. Hãy thêm campaign con hoặc chờ nguồn có bài mới."
                              class="px-2.5 py-1 rounded-full border border-amber-500/25 bg-amber-50 text-amber-700 font-black tracking-wide">
                            HẾT NỘI DUNG · CẦN THÊM CAMPAIGN
                        </span>
                        <span x-show="g.auto_attention === 'no_campaign'"
                              title="Auto-run đang bật nhưng group chưa có campaign con nào được bật."
                              class="px-2.5 py-1 rounded-full border border-rose-500/25 bg-rose-50 text-rose-700 font-black tracking-wide">
                            CHƯA CÓ CAMPAIGN BẬT
                        </span>
                    </div>
                </div>
                <div class="flex items-center gap-2 shrink-0">
                    <span class="rounded-full border border-slate-200 bg-slate-50 px-3 py-1 text-[10px] font-semibold text-slate-600" x-text="(g.topic_count || 0) + ' topics'"></span>
                    <button @click="openGroup(g)" class="h-8 px-3.5 rounded-xl bg-sky-600 text-white text-[11px] font-semibold shadow-sm shadow-sky-950/30">Mở</button>
                    <button @click="deleteGroup(g.id)" class="h-8 px-3.5 rounded-xl border border-rose-200 bg-rose-50 text-rose-700 text-[11px] font-semibold">Xoá</button>
                </div>
            </div>
        </template>
        <div x-show="!groups.length" class="rounded-[16px] border border-dashed border-slate-200 bg-slate-50 p-5">
            <div class="flex flex-col gap-3">
                <div>
                    <div class="text-sm font-semibold text-slate-900">Chưa có group nào</div>
                    <div class="mt-1 text-xs leading-6 text-slate-500">Bắt đầu bằng cách tạo 1 group nguồn để gom topic, campaign con và lịch auto-run vào cùng một workspace.</div>
                </div>
                <div class="flex flex-wrap gap-2 text-[11px] text-slate-500">
                    <span class="rounded-full border border-slate-200 bg-white px-3 py-1">1. Nhập tên group</span>
                    <span class="rounded-full border border-slate-200 bg-white px-3 py-1">2. Dán `source_key` hoặc group ID</span>
                    <span class="rounded-full border border-slate-200 bg-white px-3 py-1">3. Bấm `Lưu Group`</span>
                </div>
            </div>
        </div>
    </div>
</main>
